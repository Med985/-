<!DOCTYPE html>
<html lang="en">
<head>

</head>
<body>
    <div>
        <p class="p1">تسجيل المتربصين</p>

        <input type="text" placeholder="تاريخ بداية التمهين :"  id="n2">
        <input type="text" placeholder="التخصص :" id="n3">

    <div class="file-actions">

    <label for="uploadFile" class="btn-upload">رفع ملف البيانات لتعويضها</label>

</div>
